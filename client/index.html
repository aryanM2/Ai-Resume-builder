<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create professional resumes in minutes with our AI-powered resume builder. Enhance your summary, job descriptions, and upload existing resumes with AI assistance." />
    <meta name="keywords" content="resume builder, AI resume, professional resume, CV builder, resume templates, job application, career tools" />
    <meta name="author" content="ResumeAI" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ResumeAI - AI-Powered Resume Builder" />
    <meta property="og:description" content="Create professional resumes in minutes with our AI-powered resume builder" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ResumeAI - AI-Powered Resume Builder" />
    <meta name="twitter:description" content="Create professional resumes in minutes with our AI-powered resume builder" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Content Security Policy for external services -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://lumberjack.razorpay.com; connect-src 'self' http://localhost:3000 https://checkout.razorpay.com https://lumberjack.razorpay.com https://api.github.com https://generativelanguage.googleapis.com;">
    
    <title>ResumeAI - AI-Powered Resume Builder</title>

    <!-- Razorpay Checkout Script -->
    <script async src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      // Fallback for Razorpay loading
      window.razorpayRetries = 0;
      const loadRazorpay = () => {
        if (window.Razorpay) {
          console.log('✓ Razorpay loaded successfully');
          return;
        }
        if (window.razorpayRetries < 3) {
          window.razorpayRetries++;
          setTimeout(loadRazorpay, 1000);
        } else {
          console.warn('⚠ Razorpay failed to load after retries');
        }
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadRazorpay);
      } else {
        setTimeout(loadRazorpay, 100);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
